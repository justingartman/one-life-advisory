<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <style>
      .around { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 500; letter-spacing: 0.32em; }
      .mark { font-family: 'Cormorant Garamond', 'Times New Roman', Georgia, serif; font-weight: 500; }
    </style>
    <path id="topArc" d="M 70,160 A 90,90 0 0 1 250,160" fill="none"/>
  </defs>

  <circle cx="160" cy="160" r="148" fill="#1A2845"/>
  <circle cx="160" cy="160" r="142" fill="none" stroke="#A67C52" stroke-width="1"/>

  <!-- OL Monogram centered on circle center -->
  <text x="160" y="200" class="mark" font-size="120" fill="#EFE7D8" text-anchor="middle">
    <tspan>O</tspan><tspan dx="3" fill="#A67C52">L</tspan>
  </text>

  <text class="around" font-size="13" fill="#EFE7D8">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">ONE LIFE ADVISORY</textPath>
  </text>

  <circle cx="18" cy="160" r="3" fill="#A67C52"/>
  <circle cx="302" cy="160" r="3" fill="#A67C52"/>
</svg>
