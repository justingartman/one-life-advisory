<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" width="800" height="220">
  <defs>
    <style>
      .name { font-family: 'Cormorant Garamond', 'Times New Roman', Georgia, serif; font-weight: 600; letter-spacing: -0.005em; }
      .name-italic { font-family: 'Cormorant Garamond', 'Times New Roman', Georgia, serif; font-weight: 600; font-style: italic; letter-spacing: -0.005em; }
      .mark { font-family: 'Cormorant Garamond', 'Times New Roman', Georgia, serif; font-weight: 500; }
      .tag { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; font-weight: 500; letter-spacing: 0.28em; }
    </style>
  </defs>

  <!-- OL Monogram (no badge background — letters sit directly on dark surface) -->
  <g transform="translate(40, 50)">
    <rect width="120" height="120" rx="18" fill="none" stroke="#A67C52" stroke-width="1.5"/>
    <text x="60" y="86" class="mark" font-size="82" fill="#EFE7D8" text-anchor="middle">
      <tspan>O</tspan><tspan dx="2" fill="#A67C52">L</tspan>
    </text>
  </g>

  <!-- Wordmark in cream for dark surfaces -->
  <g transform="translate(195, 0)">
    <text x="0" y="115" font-size="68">
      <tspan class="name" fill="#EFE7D8">One Life </tspan><tspan class="name-italic" fill="#A67C52">Advisory</tspan>
    </text>
    <g transform="translate(260, 142)">
      <text x="0" y="5" class="tag" font-size="11" fill="#C7BFB0" text-anchor="middle">PURPOSE-DRIVEN FINANCIAL PLANNING</text>
      <line x1="-200" y1="0" x2="-165" y2="0" stroke="#A67C52" stroke-width="1.2"/>
      <line x1="165" y1="0" x2="200" y2="0" stroke="#A67C52" stroke-width="1.2"/>
    </g>
  </g>
</svg>
